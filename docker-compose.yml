services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://api.whatdis.nl
        VITE_GOOGLE_ADSENSE_ACCOUNT: ${VITE_GOOGLE_ADSENSE_ACCOUNT:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    networks:
      - default
      - whatdis-net
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        PRIMARY=app.whatdis.nl;
        EMAIL=justuskaterberg@hotmail.com;
        DOMAIN_ARGS='-d whatdis.nl -d app.whatdis.nl -d api.whatdis.nl';
        sleep 10;
        while :; do
          if [ ! -s \"/etc/letsencrypt/live/$$PRIMARY/fullchain.pem\" ] \
             || openssl x509 -in /etc/letsencrypt/live/$$PRIMARY/fullchain.pem -noout -issuer | grep -q \"CN=$$PRIMARY\" \
             || ! openssl x509 -in /etc/letsencrypt/live/$$PRIMARY/fullchain.pem -noout -ext subjectAltName | grep -q \"DNS:whatdis.nl\"; then
            echo \"Issuing initial Let's Encrypt cert for $$DOMAIN_ARGS\";
            certbot certonly --webroot -w /var/www/certbot \
              $$DOMAIN_ARGS --email $$EMAIL --agree-tos -n --expand --force-renewal || true;
          else
            certbot renew --webroot -w /var/www/certbot --quiet || true;
          fi;
          sleep 12h & wait $$!;
        done"

networks:
  whatdis-net:
    external: true

volumes:
  letsencrypt:
  certbot-webroot:
