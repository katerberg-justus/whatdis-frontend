# HTTP: ACME challenge passthrough + redirect everything else to HTTPS (both vhosts)
server {
    listen 80;
    server_name whatdis.nl app.whatdis.nl api.whatdis.nl whatdis.app play.whatdis.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — frontend SPA at app.whatdis.nl
server {
    listen 443 ssl;
    server_name whatdis.nl app.whatdis.nl whatdis.app;

    ssl_certificate     /etc/letsencrypt/live/app.whatdis.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.whatdis.nl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    root  /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache hashed static assets aggressively
    location ~* \.(js|css|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — let React Router handle all client-side routes
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}

# HTTPS — static marketing/landing site at play.whatdis.app
server {
    listen 443 ssl;
    server_name play.whatdis.app;

    ssl_certificate     /etc/letsencrypt/live/app.whatdis.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.whatdis.nl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    root  /usr/share/nginx/website;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location ~* \.(js|css|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}

# HTTPS — public API at api.whatdis.nl, reverse-proxied to the backend api container
server {
    listen 443 ssl;
    server_name api.whatdis.nl;

    ssl_certificate     /etc/letsencrypt/live/app.whatdis.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.whatdis.nl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    client_max_body_size 10m;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream api:8000;

    location / {
        proxy_pass         http://$api_upstream$request_uri;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
