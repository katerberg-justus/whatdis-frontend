services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        DOMAIN=app.whatdis.nl;
        EMAIL=justuskaterberg@hotmail.com;
        # Wait for nginx (with bootstrap self-signed cert) to be serving on :80
        sleep 10;
        while :; do
          if [ ! -s \"/etc/letsencrypt/live/$$DOMAIN/fullchain.pem\" ] \
             || openssl x509 -in /etc/letsencrypt/live/$$DOMAIN/fullchain.pem -noout -issuer | grep -q \"CN=$$DOMAIN\"; then
            echo \"Issuing initial Let's Encrypt cert for $$DOMAIN\";
            certbot certonly --webroot -w /var/www/certbot \
              -d $$DOMAIN --email $$EMAIL --agree-tos -n --force-renewal || true;
          else
            certbot renew --webroot -w /var/www/certbot --quiet || true;
          fi;
          sleep 12h & wait $$!;
        done"

volumes:
  letsencrypt:
  certbot-webroot:
